<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Top toggle track (pill outline) -->
  <rect x="2" y="3" width="12" height="3.5" rx="1.75" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Top toggle handle (right = ON) -->
  <circle cx="11" cy="4.75" r="1.5" fill="white"/>
  <!-- Bottom toggle track (pill outline) -->
  <rect x="2" y="9.5" width="12" height="3.5" rx="1.75" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Bottom toggle handle (left = OFF) -->
  <circle cx="5" cy="11.25" r="1.5" fill="white"/>
</svg>
